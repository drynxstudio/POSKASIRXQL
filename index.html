<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wijaya POS System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary: #2c3e50; --accent: #27ae60; }
    body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .nav-pills .nav-link.active { background-color: var(--primary); }
    .total-display { background: var(--primary); color: #00ff00; padding: 20px; border-radius: 10px; font-size: 2rem; font-weight: bold; text-align: right; }
    @media print { .no-print { display: none; } #printArea { display: block !important; } }
  </style>
</head>
<body>

<div class="container-fluid p-4 no-print">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-primary">WIJAYA <span class="text-secondary">PRO</span></h2>
    <div id="connectionStatus" class="badge bg-warning">Menghubungkan...</div>
  </div>

  <ul class="nav nav-pills mb-4 justify-content-center" id="mainTab">
    <li class="nav-item"><a class="nav-link active" data-bs-toggle="pill" href="#kasir">🛒 Kasir</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#inventori" onclick="muatData()">📦 Inventori</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#supply">🚚 Supply Chain</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#dashboard">📊 Dashboard</a></li>
  </ul>

  <div class="tab-content">
    <div class="tab-pane fade show active" id="kasir">
      <div class="row">
        <div class="col-md-4">
          <div class="card p-3 mb-3">
            <button class="btn btn-primary mb-3" onclick="startScan('reader-kasir')">📸 Scan Belanjaan</button>
            <div id="reader-kasir" style="display:none;"></div>
            <input type="text" id="manualInput" class="form-control" placeholder="Input Kode Manual...">
          </div>
        </div>
        <div class="col-md-8">
          <div class="card p-3">
            <table class="table align-middle">
              <thead><tr><th>Produk</th><th>Harga</th><th>Qty</th><th>Subtotal</th><th></th></tr></thead>
              <tbody id="cartTable"></tbody>
            </table>
            <div class="total-display" id="grandTotal">Rp 0</div>
            <button class="btn btn-success w-100 mt-3 py-3 fw-bold" onclick="checkout()">SELESAI & CETAK STRUK</button>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-pane fade" id="inventori">
      <div class="row">
        <div class="col-md-4">
          <div class="card p-3 shadow-sm">
            <h5>Register Barang Baru</h5>
            <button class="btn btn-outline-secondary btn-sm mb-2" onclick="startScan('reader-reg')">📸 Scan Kode</button>
            <div id="reader-reg" style="display:none;"></div>
            <input type="text" id="regKode" class="form-control mb-2" placeholder="Kode Barcode">
            <input type="text" id="regNama" class="form-control mb-2" placeholder="Nama Barang">
            <input type="number" id="regHarga" class="form-control mb-2" placeholder="Harga Jual">
            <input type="number" id="regStok" class="form-control mb-3" placeholder="Stok Awal">
            <button class="btn btn-primary w-100" onclick="simpanBarangBaru()">Simpan ke Database</button>
          </div>
        </div>
        <div class="col-md-8">
          <div class="card p-3">
            <div class="d-flex justify-content-between mb-3">
              <h5>Stok Gudang</h5>
              <button class="btn btn-dark btn-sm" onclick="window.print()">🖨️ Cetak Database Ready</button>
            </div>
            <table class="table table-sm table-hover">
              <thead class="table-light"><tr><th>Kode</th><th>Nama</th><th>Harga</th><th>Stok</th></tr></thead>
              <tbody id="inventoryTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-pane fade" id="supply">
      <div class="card p-4 mx-auto" style="max-width: 500px;">
        <h5 class="text-center">🚚 Update Stok Masuk (Restock)</h5>
        <button class="btn btn-secondary mb-3" onclick="startScan('reader-supply')">📸 Scan Barcode Barang</button>
        <div id="reader-supply" style="display:none;"></div>
        <input type="text" id="supKode" class="form-control mb-2" placeholder="Kode Terdeteksi" readonly>
        <input type="number" id="supJumlah" class="form-control mb-3" placeholder="Jumlah Stok Masuk">
        <button class="btn btn-success w-100" onclick="updateSupply()">Update Stok</button>
      </div>
    </div>

    <div class="tab-pane fade" id="dashboard">
      <div class="row text-center">
        <div class="col-md-4 mb-3">
          <div class="card p-4 bg-white"><h6>Total Item Produk</h6><h2 id="dashTotalItem">0</h2></div>
        </div>
        <div class="col-md-4 mb-3">
          <div class="card p-4 bg-white text-danger"><h6>Produk Stok Tipis (< 5)</h6><h2 id="dashLowStock">0</h2></div>
        </div>
        <div class="col-md-4 mb-3">
          <div class="card p-4 bg-primary text-white"><h6>Total Valuasi Aset</h6><h2 id="dashValuasi">0</h2></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="printArea" style="display:none; font-family: monospace; width: 300px; padding: 10px;"></div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbz0l-OkGzMXhMc3RkLbbqpXoLSpzudoJVXxd4RLPybpvdUHDqP9v3zd53jvXM5XOSF2IQ/exec";
  let dbProduk = [];
  let cart = [];
  let scanner;

  // AUTO LOAD DATA
  async function muatData() {
    try {
      const res = await fetch(API_URL);
      const data = await res.json();
      dbProduk = data.slice(1);
      renderTables();
      document.getElementById('connectionStatus').innerText = "Online";
      document.getElementById('connectionStatus').className = "badge bg-success";
      updateDashboard();
    } catch (e) { console.error("Offline"); }
  }

  // SCANNER LOGIC
  function startScan(elementId) {
    document.getElementById(elementId).style.display = 'block';
    scanner = new Html5QrcodeScanner(elementId, { fps: 10, qrbox: 250 });
    scanner.render((txt) => {
      if(elementId === 'reader-kasir') addToCart(txt);
      if(elementId === 'reader-reg') document.getElementById('regKode').value = txt;
      if(elementId === 'reader-supply') document.getElementById('supKode').value = txt;
      scanner.clear();
      document.getElementById(elementId).style.display = 'none';
    });
  }

  // ADD TO CART WITH FIX (STRING COMPARISON)
  function addToCart(kode) {
    const item = dbProduk.find(p => String(p[0]) === String(kode));
    if(!item) return alert("Barcode Tidak Dikenali!");
    if(item[3] <= 0) return alert("Stok Habis!");

    const inCart = cart.find(c => c.kode === item[0]);
    if(inCart) { inCart.qty++; inCart.subtotal = inCart.qty * inCart.harga; }
    else { cart.push({ kode: item[0], nama: item[1], harga: item[2], qty: 1, subtotal: item[2] }); }
    renderCart();
  }

  function renderCart() {
    let h = ''; let t = 0;
    cart.forEach((c, i) => {
      t += c.subtotal;
      h += `<tr><td>${c.nama}</td><td>${c.harga.toLocaleString()}</td><td>${c.qty}</td><td>${c.subtotal.toLocaleString()}</td><td><button class="btn btn-sm btn-danger" onclick="cart.splice(${i},1);renderCart()">x</button></td></tr>`;
    });
    document.getElementById('cartTable').innerHTML = h;
    document.getElementById('grandTotal').innerText = "Rp " + t.toLocaleString();
  }

  // SUPPLY UPDATE
  async function updateSupply() {
    const data = { tipe: "supply_stok", kode: document.getElementById('supKode').value, jumlah: document.getElementById('supJumlah').value };
    await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
    alert("Stok Diperbarui!"); muatData();
  }

  // DASHBOARD LOGIC
  function updateDashboard() {
    document.getElementById('dashTotalItem').innerText = dbProduk.length;
    document.getElementById('dashLowStock').innerText = dbProduk.filter(p => p[3] < 5).length;
    const valuasi = dbProduk.reduce((acc, p) => acc + (p[2] * p[3]), 0);
    document.getElementById('dashValuasi').innerText = "Rp " + valuasi.toLocaleString();
  }

  function renderTables() {
    let h = '';
    dbProduk.forEach(p => {
      h += `<tr><td>${p[0]}</td><td>${p[1]}</td><td>${p[2].toLocaleString()}</td><td>${p[3]}</td></tr>`;
    });
    document.getElementById('inventoryTable').innerHTML = h;
  }

  async function checkout() {
    if(cart.length === 0) return;
    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ tipe: "transaksi", item: cart }) });
    alert("Transaksi Selesai!");
    cart = []; renderCart(); muatData();
  }

  window.onload = muatData;
</script>
</body>
</html>
