<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Pro - Retail Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }
    .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .nav-pills .nav-link { font-weight: 600; color: #4b5563; }
    .nav-pills .nav-link.active { background-color: #2563eb; }
    .total-display { background: #1f2937; color: #10b981; padding: 15px; border-radius: 8px; font-size: 1.8rem; font-weight: bold; text-align: right; }
    .cart-box { height: 280px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 15px; background: white;}
    
    @media print {
      body * { display: none !important; }
      #printArea, #printArea * { display: block !important; visibility: visible !important; }
      #printArea { position: absolute; left: 0; top: 0; width: 100%; font-family: monospace; font-size: 12px; color: black; background: white;}
    }
  </style>
</head>
<body>

<div class="container-fluid p-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold text-primary m-0"><i class="bi bi-shop"></i> POS System</h4>
    <div>
      <button class="btn btn-sm btn-outline-warning fw-bold me-2" onclick="recallBill()"><i class="bi bi-arrow-clockwise"></i> Buka Hold Bill</button>
      <span id="koneksiBadge" class="badge bg-secondary p-2">Menghubungkan...</span>
    </div>
  </div>

  <ul class="nav nav-pills mb-3 bg-white p-2 rounded shadow-sm" id="mainTab">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#kasir">🛒 Kasir</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#inventori">📦 Inventori</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#supply">🚚 Restock</button></li>
  </ul>

  <div class="tab-content">
    
    <div class="tab-pane fade show active" id="kasir">
      <div class="row g-3">
        <div class="col-lg-4">
          <div class="card p-3">
            <div class="input-group mb-3">
              <span class="input-group-text bg-primary text-white" onclick="startScan('reader-kasir')" style="cursor:pointer;"><i class="bi bi-upc-scan"></i> Scan</span>
              <input type="text" id="manualInput" class="form-control" placeholder="Ketik Barcode / Nama">
            </div>
            <div id="reader-kasir" style="display:none;" class="mb-3"></div>

            <div class="row g-2 mb-3">
              <div class="col-6">
                <label class="small text-muted fw-bold">Diskon Struk (Rp)</label>
                <input type="number" id="inputDiskon" class="form-control form-control-sm" value="0" onkeyup="kalkulasiTotal()">
              </div>
              <div class="col-6">
                <label class="small text-muted fw-bold">Pajak PPN (%)</label>
                <input type="number" id="inputPajak" class="form-control form-control-sm" value="0" onkeyup="kalkulasiTotal()">
              </div>
            </div>

            <label class="small text-muted fw-bold">Metode Pembayaran</label>
            <select id="metodeBayar" class="form-select form-select-sm mb-3">
              <option value="Tunai">Tunai / Cash</option>
              <option value="QRIS">QRIS / E-Wallet</option>
              <option value="Transfer">Transfer Bank</option>
            </select>

            <label class="small text-muted fw-bold">Uang Diterima (Rp)</label>
            <input type="number" id="uangBayar" class="form-control mb-2" placeholder="0" onkeyup="kalkulasiTotal()">
            
            <div class="d-flex justify-content-between fw-bold h5">
              <span>Kembali:</span>
              <span id="uangKembali" class="text-danger">Rp 0</span>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card p-3 h-100">
            <div class="d-flex justify-content-between mb-2">
              <h6 class="fw-bold m-0">Keranjang Belanja</h6>
              <div>
                <button class="btn btn-sm btn-outline-secondary me-2" onclick="holdBill()"><i class="bi bi-pause-circle"></i> Tahan (Hold)</button>
                <button class="btn btn-sm btn-outline-danger" onclick="voidBill()"><i class="bi bi-trash"></i> Batal (Void)</button>
              </div>
            </div>
            
            <div class="cart-box p-2">
              <table class="table table-sm table-hover align-middle">
                <thead class="table-light sticky-top"><tr><th>Item</th><th>Harga</th><th width="80">Qty</th><th>Subtotal</th><th></th></tr></thead>
                <tbody id="cartTable"></tbody>
              </table>
            </div>

            <div class="row px-2 mb-2 text-muted small fw-bold">
              <div class="col-6">Subtotal: <span id="lblSubtotal">Rp 0</span></div>
              <div class="col-6 text-end">Pajak: <span id="lblPajak">Rp 0</span> | Diskon: <span id="lblDiskon">Rp 0</span></div>
            </div>

            <div class="total-display mb-3" id="grandTotal">Rp 0</div>
            <button class="btn btn-success w-100 py-3 fw-bold fs-5" id="btnCheckout" onclick="checkout()"><i class="bi bi-printer"></i> PROSES TRANSAKSI</button>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-pane fade" id="inventori">
      <div class="row g-3">
        <div class="col-md-4">
          <div class="card p-3">
            <h6>Register Barang Baru</h6>
            <input type="text" id="regKode" class="form-control form-control-sm mb-2" placeholder="Kode Barcode">
            <input type="text" id="regNama" class="form-control form-control-sm mb-2" placeholder="Nama">
            <input type="number" id="regHarga" class="form-control form-control-sm mb-2" placeholder="Harga Jual">
            <input type="number" id="regStok" class="form-control form-control-sm mb-3" placeholder="Stok Awal">
            <button class="btn btn-primary btn-sm w-100" onclick="simpanBarangBaru()">Simpan Data</button>
          </div>
        </div>
        <div class="col-md-8">
          <div class="card p-3">
            <table class="table table-sm">
              <thead class="table-dark"><tr><th>Kode</th><th>Nama</th><th>Harga</th><th>Stok</th></tr></thead>
              <tbody id="inventoryTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-pane fade" id="supply">
      <div class="card p-4 mx-auto" style="max-width: 500px;">
        <h6 class="fw-bold">Update Stok Masuk</h6>
        <input type="text" id="supKode" class="form-control mb-2" placeholder="Kode Barcode">
        <input type="number" id="supJumlah" class="form-control mb-3" placeholder="Jumlah Barang Datang">
        <button class="btn btn-success w-100" onclick="updateSupply()">Tambahkan Stok</button>
      </div>
    </div>

  </div>
</div>

<div id="printArea"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // ==========================================
  const API_URL = "https://script.google.com/macros/s/AKfycbxXJWkBYqz7hvV6e_4c213hufFHPnttiQiEneSl3uWEmWealU-bs16nXtE99gIZdBsZig/exec";
  // ==========================================

  let dbProduk = []; let cart = []; let scanner;
  let summary = { subtotal: 0, diskon: 0, pajak: 0, grandTotal: 0 };

  async function muatData() {
    try {
      const res = await fetch(API_URL);
      const data = await res.json();
      dbProduk = data.produk.length > 0 ? data.produk.slice(1) : [];
      document.getElementById('koneksiBadge').className = "badge bg-success p-2";
      document.getElementById('koneksiBadge').innerText = "Online";
      renderTables();
    } catch (e) { document.getElementById('koneksiBadge').className = "badge bg-danger p-2"; document.getElementById('koneksiBadge').innerText = "Offline"; }
  }

  // Scanner Universal
  function startScan(id) {
    document.getElementById(id).style.display = 'block';
    if(scanner) scanner.clear();
    scanner = new Html5QrcodeScanner(id, { fps: 10, qrbox: 250 });
    scanner.render((txt) => {
      if(id === 'reader-kasir') addToCart(txt);
      scanner.clear(); document.getElementById(id).style.display = 'none';
    });
  }

  document.getElementById('manualInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') { addToCart(this.value.trim()); this.value = ''; }
  });

  // Fitur KASIR
  function addToCart(kode) {
    const item = dbProduk.find(p => String(p[0]) === String(kode));
    if(!item) return alert("Barang Tidak Ditemukan!");
    if(item[3] <= 0) return alert("Stok Habis!");

    const inCart = cart.find(c => c.kode === item[0]);
    if(inCart) { inCart.qty++; inCart.subtotal = inCart.qty * inCart.harga; }
    else { cart.push({ kode: item[0], nama: item[1], harga: item[2], qty: 1, subtotal: item[2] }); }
    renderCart();
  }

  function renderCart() {
    let h = ''; summary.subtotal = 0;
    cart.forEach((c, i) => {
      summary.subtotal += c.subtotal;
      h += `<tr>
        <td class="fw-bold">${c.nama}</td><td>${c.harga.toLocaleString()}</td>
        <td><input type="number" class="form-control form-control-sm text-center" value="${c.qty}" onchange="updateQty(${i}, this.value)"></td>
        <td class="fw-bold">${c.subtotal.toLocaleString()}</td>
        <td><button class="btn btn-sm btn-danger py-0" onclick="cart.splice(${i},1);renderCart()"><i class="bi bi-x"></i></button></td>
      </tr>`;
    });
    document.getElementById('cartTable').innerHTML = h;
    kalkulasiTotal();
  }

  function updateQty(idx, val) {
    if(val < 1) cart.splice(idx,1); 
    else { cart[idx].qty = parseInt(val); cart[idx].subtotal = cart[idx].qty * cart[idx].harga; }
    renderCart();
  }

  function kalkulasiTotal() {
    summary.diskon = Number(document.getElementById('inputDiskon').value) || 0;
    let persenPajak = Number(document.getElementById('inputPajak').value) || 0;
    
    let subSetelahDiskon = summary.subtotal - summary.diskon;
    summary.pajak = subSetelahDiskon * (persenPajak / 100);
    summary.grandTotal = subSetelahDiskon + summary.pajak;

    document.getElementById('lblSubtotal').innerText = "Rp " + summary.subtotal.toLocaleString();
    document.getElementById('lblDiskon').innerText = "Rp " + summary.diskon.toLocaleString();
    document.getElementById('lblPajak').innerText = "Rp " + summary.pajak.toLocaleString();
    document.getElementById('grandTotal').innerText = "Rp " + summary.grandTotal.toLocaleString();

    let bayar = Number(document.getElementById('uangBayar').value) || 0;
    let kembali = bayar - summary.grandTotal;
    let uiKembali = document.getElementById('uangKembali');
    
    if (kembali < 0) { uiKembali.innerText = "Kurang Rp " + Math.abs(kembali).toLocaleString(); uiKembali.className = "text-danger"; } 
    else { uiKembali.innerText = "Rp " + kembali.toLocaleString(); uiKembali.className = "text-success"; }
  }

  // FITUR ADVANCED POS
  function holdBill() {
    if(cart.length === 0) return alert("Keranjang Kosong!");
    localStorage.setItem('hold_bill', JSON.stringify(cart));
    cart = []; renderCart(); alert("Transaksi Ditahan!");
  }

  function recallBill() {
    let saved = localStorage.getItem('hold_bill');
    if(!saved) return alert("Tidak ada transaksi tertahan.");
    cart = JSON.parse(saved);
    localStorage.removeItem('hold_bill');
    renderCart(); alert("Transaksi Dibuka Kembali!");
  }

  function voidBill() {
    if(confirm("Yakin ingin membatalkan/void seluruh transaksi ini?")) {
      cart = []; document.getElementById('inputDiskon').value = 0; document.getElementById('inputPajak').value = 0;
      renderCart();
    }
  }

  async function checkout() {
    if(cart.length === 0) return alert("Keranjang Kosong!");
    document.getElementById('btnCheckout').innerText = "MEMPROSES...";
    
    let payload = {
      tipe: "transaksi", item: cart,
      diskon: summary.diskon, pajak: summary.pajak, totalAkhir: summary.grandTotal,
      metodeBayar: document.getElementById('metodeBayar').value
    };

    try {
      await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
      cetakStrukArea();
      cart = []; document.getElementById('uangBayar').value = ""; renderCart(); muatData();
    } catch (e) { alert("Gagal transaksi!"); }
    document.getElementById('btnCheckout').innerHTML = '<i class="bi bi-printer"></i> PROSES TRANSAKSI';
  }

  function cetakStrukArea() {
    let tgl = new Date().toLocaleString('id-ID');
    let mtd = document.getElementById('metodeBayar').value;
    let byr = Number(document.getElementById('uangBayar').value) || summary.grandTotal;
    
    let html = `<div style="width: 250px; margin: auto; padding: 10px;">
      <div style="text-align:center; border-bottom: 2px dashed #000; margin-bottom:10px;">
        <h3 style="margin:0;">POS WIJAYA</h3><small>${tgl}</small>
      </div><table style="width:100%; border-collapse:collapse;">`;
      
    cart.forEach(c => {
      html += `<tr><td colspan="2"><b>${c.nama}</b></td></tr>
               <tr><td>${c.qty} x ${c.harga.toLocaleString()}</td><td align="right">${c.subtotal.toLocaleString()}</td></tr>`;
    });

    html += `</table><hr style="border-top:1px dashed #000;">
      <table width="100%">
        <tr><td>Subtotal</td><td align="right">${summary.subtotal.toLocaleString()}</td></tr>
        <tr><td>Diskon</td><td align="right">-${summary.diskon.toLocaleString()}</td></tr>
        <tr><td>PPN</td><td align="right">+${summary.pajak.toLocaleString()}</td></tr>
        <tr><td><b>TOTAL</b></td><td align="right"><b>Rp ${summary.grandTotal.toLocaleString()}</b></td></tr>
        <tr><td>BAYAR (${mtd})</td><td align="right">${byr.toLocaleString()}</td></tr>
        <tr><td>KEMBALI</td><td align="right">${(byr - summary.grandTotal).toLocaleString()}</td></tr>
      </table><div style="text-align:center; margin-top:20px;">Layanan Kasir Terintegrasi</div></div>`;
      
    document.getElementById('printArea').innerHTML = html; window.print();
  }

  // Inventori & Supply Basic
  async function simpanBarangBaru() {
    let d = { tipe: "tambah_produk", kode: document.getElementById('regKode').value, nama: document.getElementById('regNama').value, harga: document.getElementById('regHarga').value, stok: document.getElementById('regStok').value };
    await fetch(API_URL, { method: 'POST', body: JSON.stringify(d) }); alert("Tersimpan!"); muatData();
  }
  async function updateSupply() {
    let d = { tipe: "supply_stok", kode: document.getElementById('supKode').value, jumlah: document.getElementById('supJumlah').value };
    await fetch(API_URL, { method: 'POST', body: JSON.stringify(d) }); alert("Stok Ditambah!"); muatData();
  }
  function renderTables() {
    let h = ''; dbProduk.forEach(p => {
      h += `<tr><td>${p[0]}</td><td class="fw-bold">${p[1]}</td><td>${p[2].toLocaleString()}</td><td>${p[3]}</td></tr>`;
    });
    document.getElementById('inventoryTable').innerHTML = h;
  }

  window.onload = muatData;
</script>
</body>
</html>
