<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasir & Stok Wijaya</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f4f6f9; }
    .nav-tabs .nav-link { font-weight: bold; color: #555; }
    .nav-tabs .nav-link.active { color: #0d6efd; }
    .cart-container { max-height: 400px; overflow-y: auto; background: white; border-radius: 8px; }
  </style>
</head>
<body class="p-2 p-md-4">

<div class="container-fluid">
  <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-kasir">🛒 KASIR</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-stok">📦 TAMBAH BARANG</button></li>
  </ul>

  <div class="tab-content">
    <div class="tab-pane fade show active" id="tab-kasir">
      <div class="row">
        <div class="col-md-5 mb-3">
          <div class="card p-3 shadow-sm border-0">
            <h6>Input Barang</h6>
            <button id="btnScanner" class="btn btn-outline-primary w-100 mb-3" onclick="toggleScanner()">📸 Buka Scanner</button>
            <div id="reader" style="display:none; width:100%;"></div>
            <div class="input-group mb-3">
              <input type="text" id="barcodeInput" class="form-control" placeholder="Scan / Ketik Kode">
              <button class="btn btn-primary" onclick="tambahKeKeranjangManual()">Tambah</button>
            </div>
            <select id="produkSelect" class="form-select" onchange="tambahViaSelect()"><option value="">-- Muat Data... --</option></select>
          </div>
        </div>
        <div class="col-md-7">
          <div class="card p-3 shadow-sm border-0">
            <h6>Keranjang</h6>
            <div class="cart-container border p-2 mb-2"><table class="table align-middle"><tbody id="keranjangBody"></tbody></table></div>
            <div class="d-flex justify-content-between fw-bold h5 p-2 bg-dark text-success rounded"><span>TOTAL:</span><span id="grandTotal">Rp 0</span></div>
            <button id="btnBayar" class="btn btn-success w-100 py-3 mt-2 fw-bold" onclick="prosesBayar()">PROSES BAYAR</button>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-pane fade" id="tab-stok">
      <div class="card p-4 shadow-sm border-0 col-md-6 mx-auto">
        <h5 class="mb-4">Daftarkan Produk Baru</h5>
        <div class="mb-3"><label>Kode Barcode</label><input type="text" id="newKode" class="form-control" placeholder="Scan atau ketik kode barang"></div>
        <div class="mb-3"><label>Nama Barang</label><input type="text" id="newNama" class="form-control" placeholder="Misal: Nasi Kotak Ayam"></div>
        <div class="mb-3"><label>Harga Jual</label><input type="number" id="newHarga" class="form-control" placeholder="Misal: 25000"></div>
        <button id="btnSimpanProduk" class="btn btn-primary w-100 py-2" onclick="simpanProdukKeSheet()">💾 SIMPAN KE DATABASE</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbz0l-OkGzMXhMc3RkLbbqpXoLSpzudoJVXxd4RLPybpvdUHDqP9v3zd53jvXM5XOSF2IQ/exec"; 
  let daftarProduk = [];
  let keranjang = [];
  let html5QrcodeScanner;

  async function muatProduk() {
    try {
      const response = await fetch(API_URL);
      const data = await response.json();
      if(data.length > 0) {
        daftarProduk = data.slice(1);
        let select = document.getElementById('produkSelect');
        select.innerHTML = '<option value="">-- Pilih Manual --</option>';
        daftarProduk.forEach((p, i) => {
          let opt = document.createElement('option');
          opt.value = i; opt.text = `${p[1]} (Rp ${Number(p[2]).toLocaleString()})`;
          select.add(opt);
        });
      }
    } catch (e) { console.error("Gagal muat data"); }
  }

  // SIMPAN BARANG BARU KE GOOGLE SHEETS
  async function simpanProdukKeSheet() {
    const kode = document.getElementById('newKode').value;
    const nama = document.getElementById('newNama').value;
    const harga = document.getElementById('newHarga').value;
    if(!kode || !nama || !harga) return alert("Isi semua data!");

    const btn = document.getElementById('btnSimpanProduk');
    btn.innerHTML = "Menyimpan..."; btn.disabled = true;

    try {
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ tipe: "tambah_produk", kode, nama, harga })
      });
      alert("Barang berhasil didaftarkan!");
      document.getElementById('newKode').value = ""; document.getElementById('newNama').value = ""; document.getElementById('newHarga').value = "";
      muatProduk(); // Refresh daftar produk di kasir
    } catch (e) { alert("Gagal koneksi"); }
    btn.innerHTML = "💾 SIMPAN KE DATABASE"; btn.disabled = false;
  }

  // FUNGSI KASIR (SAMA SEPERTI SEBELUMNYA DENGAN TIPE: "transaksi")
  async function prosesBayar() {
    if (keranjang.length === 0) return alert("Kosong!");
    const btn = document.getElementById('btnBayar');
    btn.innerHTML = "Menyimpan..."; btn.disabled = true;
    try {
      await fetch(API_URL, { method: 'POST', body: JSON.stringify({ tipe: "transaksi", item: keranjang }) });
      alert("Berhasil!"); keranjang = []; renderKeranjang();
    } catch (e) { alert("Error"); }
    btn.innerHTML = "PROSES BAYAR"; btn.disabled = false;
  }

  // Fungsi pembantu lainnya (renderKeranjang, tambahItem, dll tetap sama)
  window.onload = muatProduk;
  function renderKeranjang() {
    let html = ''; let total = 0;
    keranjang.forEach((item, i) => {
      total += item.subtotal;
      html += `<tr><td>${item.nama}</td><td width="60"><input type="number" class="form-control p-1" value="${item.qty}" onchange="updateQty(${i}, this.value)"></td><td>${item.subtotal.toLocaleString()}</td><td><button class="btn btn-sm text-danger" onclick="hapusItem(${i})">X</button></td></tr>`;
    });
    document.getElementById('keranjangBody').innerHTML = html;
    document.getElementById('grandTotal').innerText = "Rp " + total.toLocaleString();
  }
  function tambahKeKeranjangManual() {
    let inp = document.getElementById('barcodeInput');
    if (inp.value) { tambahItem(inp.value.trim(), 'kode'); inp.value = ''; }
  }
  function tambahViaSelect() {
    let sel = document.getElementById('produkSelect');
    if (sel.value !== "") { tambahItem(sel.value, 'index'); sel.value = ""; }
  }
  function updateQty(index, val) {
    keranjang[index].qty = parseInt(val);
    keranjang[index].subtotal = keranjang[index].qty * keranjang[index].harga;
    renderKeranjang();
  }
  function hapusItem(index) { keranjang.splice(index, 1); renderKeranjang(); }
  function tambahItem(kodeAtauIndex, tipe = 'kode') {
    let item = tipe === 'kode' ? daftarProduk.find(p => String(p[0]) === String(kodeAtauIndex)) : daftarProduk[kodeAtauIndex];
    if (item) {
      let ex = keranjang.find(k => k.kode === item[0]);
      if (ex) { ex.qty++; ex.subtotal = ex.qty * ex.harga; }
      else { keranjang.push({ kode: item[0], nama: item[1], harga: Number(item[2]), qty: 1, subtotal: Number(item[2]) }); }
      renderKeranjang();
    } else { alert("Barang tidak ada di database. Daftarkan dulu di tab Tambah Barang."); }
  }
  function toggleScanner() {
    let r = document.getElementById('reader');
    if (r.style.display === 'none') {
      r.style.display = 'block';
      html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
      html5QrcodeScanner.render((txt) => { tambahItem(txt, 'kode'); });
    } else { html5QrcodeScanner.clear(); r.style.display = 'none'; }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
