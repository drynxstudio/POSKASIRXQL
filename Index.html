<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasir Pintar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f4f6f9; font-family: sans-serif; }
    .cart-container { max-height: 350px; overflow-y: auto; background: white; border-radius: 8px; }
    .total-section { background: #212529; color: #00ff00; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.2rem;}
  </style>
</head>
<body class="p-2 p-md-4">

<div class="container-fluid">
  <div class="row">
    <div class="col-md-5 mb-4">
      <div class="card shadow-sm p-3 border-0">
        <h5 class="text-center mb-3">🛒 Input Barang</h5>
        
        <button id="btnScanner" class="btn btn-outline-primary w-100 mb-3" onclick="toggleScanner()">
          📸 Buka Kamera Scanner
        </button>
        <div id="reader" style="display:none; width:100%;"></div>

        <div class="input-group mt-3 mb-3">
          <input type="text" id="barcodeInput" class="form-control" placeholder="Scan alat / Ketik kode...">
          <button class="btn btn-primary" onclick="tambahManual()">Tambah</button>
        </div>

        <select id="produkSelect" class="form-select" onchange="tambahViaSelect()">
          <option value="">-- Sedang Memuat Data... --</option>
        </select>
      </div>
    </div>

    <div class="col-md-7">
      <div class="card shadow-sm p-3 border-0">
        <h5 class="mb-3">Daftar Belanjaan</h5>
        <div class="cart-container border p-2 mb-3">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light sticky-top">
              <tr>
                <th>Produk</th>
                <th width="80px">Qty</th>
                <th>Subtotal</th>
                <th width="40px"></th>
              </tr>
            </thead>
            <tbody id="keranjangBody"></tbody>
          </table>
        </div>

        <div class="total-section d-flex justify-content-between mb-3">
          <span>TOTAL:</span>
          <span id="grandTotal">Rp 0</span>
        </div>

        <button id="btnBayar" class="btn btn-success w-100 py-3 fw-bold fs-5" onclick="prosesBayar()" disabled>
          MENGHUBUNGKAN KE SERVER...
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  // ==========================================
  // TARUH LINK GOOGLE APPS SCRIPT ANDA DI SINI
  // ==========================================
  const API_URL = "https://script.google.com/macros/s/AKfycbz0l-OkGzMXhMc3RkLbbqpXoLSpzudoJVXxd4RLPybpvdUHDqP9v3zd53jvXM5XOSF2IQ/exec"; 
  
  let daftarProduk = [];
  let keranjang = [];
  let html5QrcodeScanner;

  // 1. Ambil data via Fetch API saat buka web
  window.onload = async () => {
    try {
      const response = await fetch(API_URL);
      const data = await response.json();
      
      if(data.length > 0) {
        daftarProduk = data.slice(1); // Buang header Excel
        let select = document.getElementById('produkSelect');
        select.innerHTML = '<option value="">-- Cari Manual --</option>';
        
        daftarProduk.forEach((p, i) => {
          let opt = document.createElement('option');
          opt.value = i; opt.text = `${p[1]} (Rp ${Number(p[2]).toLocaleString('id-ID')})`;
          select.add(opt);
        });

        let btnBayar = document.getElementById('btnBayar');
        btnBayar.disabled = false;
        btnBayar.innerHTML = "PROSES PEMBAYARAN";
      }
    } catch (err) {
      alert("Gagal memuat database produk. Cek koneksi internet.");
    }
    
    document.getElementById('barcodeInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') tambahManual();
    });
  };

  // 2. Fungsi Tambah Barang
  function tambahItem(kodeAtauIndex, tipe = 'kode') {
    let item = tipe === 'kode' ? 
      daftarProduk.find(p => String(p[0]) === String(kodeAtauIndex)) : 
      daftarProduk[kodeAtauIndex];

    if (item) {
      let existing = keranjang.find(k => k.kode === item[0]);
      if (existing) {
        existing.qty++;
        existing.subtotal = existing.qty * existing.harga;
      } else {
        keranjang.push({ kode: item[0], nama: item[1], harga: Number(item[2]), qty: 1, subtotal: Number(item[2]) });
      }
      renderKeranjang();
    } else {
      alert("Barang tidak terdaftar!");
    }
  }

  function tambahManual() {
    let inp = document.getElementById('barcodeInput');
    if (inp.value) { tambahItem(inp.value.trim(), 'kode'); inp.value = ''; }
  }

  function tambahViaSelect() {
    let sel = document.getElementById('produkSelect');
    if (sel.value !== "") { tambahItem(sel.value, 'index'); sel.value = ""; }
  }

  function hapusItem(index) {
    keranjang.splice(index, 1);
    renderKeranjang();
  }

  // 3. Tampilan Keranjang
  function renderKeranjang() {
    let html = ''; let total = 0;
    keranjang.forEach((item, i) => {
      total += item.subtotal;
      html += `<tr>
          <td><small>${item.nama}</small></td>
          <td><input type="number" class="form-control form-control-sm text-center" value="${item.qty}" onchange="updateQty(${i}, this.value)"></td>
          <td class="fw-bold">${item.subtotal.toLocaleString('id-ID')}</td>
          <td><button class="btn btn-sm btn-danger" onclick="hapusItem(${i})">X</button></td>
        </tr>`;
    });
    document.getElementById('keranjangBody').innerHTML = html;
    document.getElementById('grandTotal').innerText = "Rp " + total.toLocaleString('id-ID');
  }

  function updateQty(index, val) {
    let newQty = parseInt(val);
    if (newQty < 1 || isNaN(newQty)) return hapusItem(index);
    keranjang[index].qty = newQty;
    keranjang[index].subtotal = keranjang[index].qty * keranjang[index].harga;
    renderKeranjang();
  }

  // 4. Scanner Kamera (Di GitHub pasti lancar!)
  function toggleScanner() {
    let reader = document.getElementById('reader');
    let btn = document.getElementById('btnScanner');
    
    if (reader.style.display === 'none') {
      reader.style.display = 'block';
      btn.innerHTML = "Tutup Scanner";
      btn.classList.replace('btn-outline-primary', 'btn-danger');

      html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 150 } }, false);
      html5QrcodeScanner.render((decodedText) => {
        tambahItem(decodedText, 'kode');
      });
    } else {
      if (html5QrcodeScanner) html5QrcodeScanner.clear();
      reader.style.display = 'none';
      btn.innerHTML = "📸 Buka Kamera Scanner";
      btn.classList.replace('btn-danger', 'btn-outline-primary');
    }
  }

  // 5. Simpan Data via POST API
  async function prosesBayar() {
    if (keranjang.length === 0) return alert("Keranjang kosong!");
    
    let btn = document.getElementById('btnBayar');
    btn.innerHTML = "MENYIMPAN DATA..."; btn.disabled = true;

    try {
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify(keranjang),
      });
      alert("Transaksi Berhasil Disimpan!");
      keranjang = []; renderKeranjang();
    } catch (err) {
      alert("Gagal menyimpan data!");
    } finally {
      btn.innerHTML = "PROSES PEMBAYARAN"; btn.disabled = false;
    }
  }
</script>

</body>
</html>
